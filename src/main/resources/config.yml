# Settings
settings:
  tpa-timeout-seconds: 60
  cooldown-seconds: 15
  teleport-delay-seconds: 3
  teleport-move-cancel: true
  center-messages: false

# Permissions
# "default" = No lleva permisos.
permissions:
  tpa: "default"
  tpaccept: "default"
  tpdeny: "default"
  bypass-cooldown: "xtpa.bypass.cooldown"
  bypass-delay: "xtpa.bypass.delay"
  admin: "xtpa.admin"

# Sonidos editables.
sounds:
  received-tpa:
    enabled: true
    sound: "ENTITY_EXPERIENCE_ORB_PICKUP"
    volume: 1.0
    pitch: 1.0
  teleport-start:
    enabled: true
    sound: "BLOCK_NOTE_BLOCK_HARP"
    volume: 0.5
    pitch: 1.5
  teleport-success:
    enabled: true
    sound: "ENTITY_ENDERMAN_TELEPORT"
    volume: 1.0
    pitch: 1.0

# Extra | Visuales
visuals:
  title:
    enabled: false
    title: "&#FAEDCB ℹ ¡Petición Recibida!"
    subtitle: "&f%xtpa_player% quiere teletransportarse"
    fade-in: 10
    stay: 60
    fade-out: 10
  actionbar:
    enabled: true
    message: "&f¡Oye! &#FAEDCB¡&n%xtpa_player%&f Te ha enviado un TPA! Revisa tu chat."

# Sistema de mensajes
messages:
  prefix: ""

  no-permission: "&c ✘ ¡Error! &fNo tienes permisos para ejecutar este comando."
  player-not-found: "&c ✘ &fEse jugador no está en línea o no existe."
  cooldown: "&#FF5252 ✘ ¡Error! &fDebes esperar &e%xtpa_time%s &fpara enviar otro TPA."
  self-tpa: "&#FF5252 ✘ ¡Error! &fNo puedes enviarte un TPA a ti mismo."

  tpa-sent: "&#A0FF91 ✔ ¡Exito! &fLa petición ha sido enviada a &e%xtpa_player%&f."
  tpa-no-pending: "&#FAEDCB ℹ ¡Información! &fNo tienes ninguna peticion pendiente en este momento."
  tpa-expired: "&#FAEDCB ℹ ¡Información! &fLa solicitud de teletransporte ha expirado."

  tpa-denied-target: "&#A0FF91 ✔ ¡Exito! &fHas denegado la petición de teletransporte."
  tpa-denied-sender: "&#FF5252 ✘ ¡Error! &fEl jugador &e%xtpa_player% &fha denegado tu solicitud."

  tpa-accepted-target: "&#A0FF91 ✔ ¡Exito! &fLa petición de teletransporte ha sido aceptada."
  tpa-accepted-sender: "&#A0FF91 ✔ ¡Exito! &fEl jugador &e%xtpa_player% &fha aceptado tu teletransporte."
  teleport-starting-sender: "&#A0FF91 ✔ ¡Exito! &fEstás siendo teletransportado a &e%xtpa_player%&f."
  teleport-delay-notice-sender: "&#FAEDCB ℹ ¡Información! &fSerás teletransportado en %xtpa_time% segundos. Por favor, no te muevas."

  teleport-cancelled-moved: "&#FF5252 ✘ ¡Error! &f¡Movimiento detectado! El teletransporte ha sido cancelado."
  teleport-cancelled-quit: "&#FF5252 ✘ ¡Error! &fEl jugador se ha desconectado. Teletransporte cancelado."
  teleport-success-sender: "&#A0FF91 ✔ ¡Exito! &fHas sido teletransportado correctamente."

  received-request:
    line1: "&#FAEDCB ℹ ¡Información! &fEl jugador &#FAEDCB%xtpa_player% &fte ha pedido teletransportarse hasta ti."
    line2-accept: "&fEscribe &a/tpaccept &fpara aceptar el teletransporte."
    line3-deny: "&fPara denegar el teletransporte, escribe &c/tpdeny&f."
    line4: "&#FAEDCB ℹ ¡Información! &fLa solicitud será automáticamente cancelada después de %xtpa_time% segundos."
    hover-accept: "&#A0FF91¡Click aquí para ACEPTAR!"
    hover-deny: "&c¡Click aquí para DENEGAR!"

help:
  admin:
    - ""
    - " &fComandos de adminitrador &#FAEDCB&lxTPA"
    - ""
    - "&8| &#A0FF91/tpa <jugador> &8- &fEnvía una petición"
    - "&8| &#A0FF91/tpaccept &8- &fAcepta la petición"
    - "&8| &#A0FF91/tpdeny &8- &fDeniega la petición"
    - "&8| &#A0FF91/xtpa reload &8- &fRecarga la configuración"
    - ""

  user:
    - " "
    - "     &f✔ Ayuda de &#FAEDCB&lCOMANDOS &7(/tpa)"
    - " &fEnvía solicitud de teletransporte al"
    - "&f jugador especificado para hacer el tp."
